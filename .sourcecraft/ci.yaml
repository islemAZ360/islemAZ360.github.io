on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-site
            image: docker.io/library/python:3.14-slim
            script:
              - cd source
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - mkdocs build -d ../site
              - echo "Сайт собран в папке ./site"
              - cd ..
              - ls -la ./site

          - name: publish-to-release-branch
            script:
              - git config user.name "Sourcecraft CI"
              - git config user.email "ci@sourcecraft.dev"
              - git checkout -b release
              - git add ./site
              - "git commit -m \"feat: автоматическое обновление сайта\""
              - "git push origin release -f"
